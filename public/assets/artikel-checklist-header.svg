    <rect x="125" y="190" width="410" height="18" rx="9" fill="white" opacity="0.10"/>
    <circle cx="100" cy="250" r="10" fill="url(#tealG)" opacity="0.85"/>
    <rect x="125" y="241" width="290" height="18" rx="9" fill="white" opacity="0.10"/>
    <circle cx="100" cy="301" r="10" fill="url(#tealG)" opacity="0.85"/>
    <rect x="125" y="292" width="360" height="18" rx="9" fill="white" opacity="0.10"/>
    <circle cx="100" cy="352" r="10" fill="url(#tealG)" opacity="0.75"/>
    <rect x="125" y="343" width="400" height="18" rx="9" fill="white" opacity="0.08"/>
    <circle cx="100" cy="403" r="10" fill="url(#tealG)" opacity="0.75"/>
    <rect x="125" y="394" width="340" height="18" rx="9" fill="white" opacity="0.08"/>
    <circle cx="100" cy="454" r="10" fill="url(#tealG)" opacity="0.75"/>
    <rect x="125" y="445" width="420" height="18" rx="9" fill="white" opacity="0.08"/>
    <circle cx="100" cy="505" r="10" fill="url(#tealG)" opacity="0.65"/>
    <rect x="125" y="496" width="310" height="18" rx="9" fill="white" opacity="0.07"/>
    <circle cx="100" cy="556" r="10" fill="url(#tealG)" opacity="0.65"/>
    <rect x="125" y="547" width="370" height="18" rx="9" fill="white" opacity="0.07"/>
