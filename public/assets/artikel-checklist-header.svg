  <circle cx="920" cy="315" r="14" fill="#0d9488" opacity="0.40"/>
  <circle cx="750" cy="315" r="6"  fill="#06b6d4" opacity="0.50"/>
  <circle cx="1090" cy="315" r="6" fill="#06b6d4" opacity="0.50"/>
  <circle cx="920" cy="140" r="6"  fill="#0d9488" opacity="0.45"/>
  <circle cx="920" cy="490" r="6"  fill="#0d9488" opacity="0.45"/>
  <!-- Corner accent circles -->
  <circle cx="1160" cy="50"  r="40" stroke="white" stroke-width="1" fill="none" opacity="0.06"/>
  <circle cx="1160" cy="50"  r="22" fill="white" opacity="0.04"/>
