    <rect x="125" y="88"  width="380" height="18" rx="9" fill="white" opacity="0.10"/>
    <circle cx="100" cy="148" r="10" fill="url(#tealG)" opacity="0.85"/>
    <rect x="125" y="139" width="320" height="18" rx="9" fill="white" opacity="0.10"/>
