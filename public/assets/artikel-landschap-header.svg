<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#6d1d7d"/>
      <stop offset="100%" stop-color="#9d1a51"/>
    </linearGradient>
    <linearGradient id="tealG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgG)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- 6 category nodes: 3 top row, 3 bottom row -->
  <!-- Top row: cx = 220, 600, 980; cy = 200 -->
  <!-- Bottom row: cx = 410, 790; cy = 430 (offset for visual interest) + one center bottom -->
  <!-- Connecting lines first (behind nodes) -->
  <g stroke="#0d9488" stroke-width="1.5" opacity="0.30">
    <!-- Top connections -->
    <line x1="220" y1="200" x2="600" y2="200"/>
    <line x1="600" y1="200" x2="980" y2="200"/>
    <!-- Top to bottom -->
    <line x1="220" y1="200" x2="410" y2="430"/>
    <line x1="600" y1="200" x2="410" y2="430"/>
    <line x1="600" y1="200" x2="790" y2="430"/>
    <line x1="980" y1="200" x2="790" y2="430"/>
    <!-- Bottom to center bottom -->
    <line x1="410" y1="430" x2="600" y2="530"/>
    <line x1="790" y1="430" x2="600" y2="530"/>
    <!-- Diagonal long -->
    <line x1="220" y1="200" x2="790" y2="430" opacity="0.15"/>
    <line x1="980" y1="200" x2="410" y2="430" opacity="0.15"/>
  </g>
  <!-- Top row nodes -->
  <circle cx="220" cy="200" r="44" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.05" opacity="0.70"/>
  <circle cx="220" cy="200" r="28" fill="url(#tealG)" opacity="0.35"/>
  <circle cx="220" cy="200" r="10" fill="#0d9488" opacity="0.80"/>
  <circle cx="600" cy="200" r="52" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.06" opacity="0.70"/>
  <circle cx="600" cy="200" r="34" fill="url(#tealG)" opacity="0.30"/>
  <circle cx="600" cy="200" r="12" fill="#06b6d4" opacity="0.85"/>
  <circle cx="980" cy="200" r="44" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.05" opacity="0.70"/>
  <circle cx="980" cy="200" r="28" fill="url(#tealG)" opacity="0.35"/>
  <circle cx="980" cy="200" r="10" fill="#0d9488" opacity="0.80"/>
  <!-- Bottom row nodes -->
  <circle cx="410" cy="430" r="40" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.05" opacity="0.65"/>
  <circle cx="410" cy="430" r="24" fill="url(#tealG)" opacity="0.28"/>
  <circle cx="410" cy="430" r="9"  fill="#0d9488" opacity="0.75"/>
  <circle cx="790" cy="430" r="40" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.05" opacity="0.65"/>
  <circle cx="790" cy="430" r="24" fill="url(#tealG)" opacity="0.28"/>
  <circle cx="790" cy="430" r="9"  fill="#0d9488" opacity="0.75"/>
  <!-- Center bottom node (6th) -->
  <circle cx="600" cy="530" r="36" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.05" opacity="0.60"/>
  <circle cx="600" cy="530" r="22" fill="url(#tealG)" opacity="0.25"/>
  <circle cx="600" cy="530" r="8"  fill="#0d9488" opacity="0.70"/>
  <!-- Large decorative ring (background) -->
  <circle cx="600" cy="315" r="280" stroke="white" stroke-width="1" fill="none" opacity="0.05"/>
  <circle cx="600" cy="315" r="220" stroke="white" stroke-width="0.5" fill="none" opacity="0.04"/>
  <!-- Corner accents -->
  <circle cx="1160" cy="50"  r="45" stroke="white" stroke-width="1" fill="none" opacity="0.06"/>
  <circle cx="40"   cy="590" r="30" stroke="white" stroke-width="1" fill="none" opacity="0.06"/>
  <circle cx="1160" cy="580" r="20" fill="white" opacity="0.03"/>
</svg>
